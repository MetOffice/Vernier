name: Test Python library

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r post-processing/lib/requirements.txt
    - name: Run unit tests
      run: |
        python -m unittest discover -s post-processing/lib
    - name: Type check with mypy
      run: |
        python -m mypy post-processing/lib
    - name: Run example script
      run: |
        cd post-processing/example
        python process_vernier.py vernier-output-example-collated
